name: tier-check

on: [push, pull_request]

jobs:
  tier-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run tier check
        env:
          TIER_SALT: ${{ secrets.TIER_SALT }}
        run: python scripts/tier_check.py
